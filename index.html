<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日語家教預約 | 日文老鳥</title>
    
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
    
    <script>
        window.tailwind = {
            config: {
                theme: {
                    extend: {
                        colors: {
                            'milk': '#FAF7F2',
                            'card': '#FFFFFF',
                            'mocha': '#E6DED5',
                            'mocha-dark': '#D4C4B7',
                            'ink': '#4A3F35',
                            'ink-light': '#8C7E71',
                            'accent': '#C19A6B',
                            'accent-hover': '#A88256',
                            'accent-light': '#F3EDE7'
                        },
                        fontFamily: {
                            'sans': ['"Noto Sans TC"', 'sans-serif'],
                            'serif': ['"Noto Serif TC"', 'serif'],
                        }
                    }
                }
            }
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;500;700&display=swap');
        * { -webkit-tap-highlight-color: transparent; }
        body {
            background-color: #FAF7F2;
            background-image: linear-gradient(rgba(212, 196, 183, 0.25) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(212, 196, 183, 0.25) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #4A3F35;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E6DED5; border-radius: 4px; }
        .line-border { 
            background-color: #FFFFFF;
            border: 2px solid #E6DED5;
            border-radius: 1.5rem;
            box-shadow: 0 8px 24px rgba(74, 63, 53, 0.04);
        }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loader {
            border: 3px solid #F3EDE7;
            border-top: 3px solid #4A3F35;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const GOOGLE_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbyetnlJlnFp8atdReeRS4Rx8bA1IVDVialahLq2iHj4ARTGLAXWcgEE0otjH-edDub9mQ/exec';
        const TIME_SLOTS = ["19:00~19:50", "20:00~20:50", "21:00~21:50"];
        const PURCHASE_PLANS = [
            { id: '1', name: '單堂課程', price: 700, originalPrice: null, subtitle: '' },
            { id: '8', name: '8堂課程包', price: 4800, originalPrice: 5600, subtitle: '每堂只要 NT$600' },
            { id: '20', name: '20堂課程包', price: 11000, originalPrice: 14000, subtitle: '每堂只要 NT$550' }
        ];

        const formatDate = (date) => {
            const yyyy = date.getFullYear();
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        };

        const formatDisplayDate = (date) => {
            const days = ['日', '一', '二', '三', '四', '五', '六'];
            return `${date.getMonth() + 1}/${date.getDate()} (${days[date.getDay()]})`;
        };

        const App = () => {
            const [mode, setMode] = useState(null);
            const [step, setStep] = useState(1);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [selectedDate, setSelectedDate] = useState(null);
            const [selectedTime, setSelectedTime] = useState(null);
            const [formData, setFormData] = useState({ name: '', email: '', level: '已與老師聯絡', plan: '', prepaidCode: '' });
            const [isPaying, setIsPaying] = useState(false);
            const [paymentSuccess, setPaymentSuccess] = useState(false);
            const [remainingClasses, setRemainingClasses] = useState(null);
            const [errorMsg, setErrorMsg] = useState("");
            const [viewDate, setViewDate] = useState(new Date());
            const [bookedSlots, setBookedSlots] = useState([]);
            const [closedDays, setClosedDays] = useState([]);
            const [isLoadingSlots, setIsLoadingSlots] = useState(true);
            const lastLocalUpdate = useRef(0);

            useEffect(() => {
                const fetchInitial = async () => {
                    try {
                        const response = await fetch(GOOGLE_WEBHOOK_URL, {
                            method: 'POST',
                            redirect: 'follow',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify({ type: 'get_slots' })
                        });
                        const data = await response.json();
                        if (data.slots) setBookedSlots(data.slots);
                        if (data.closedDays) setClosedDays(data.closedDays);
                    } catch(e) { console.error(e); }
                    finally { setIsLoadingSlots(false); }
                };
                fetchInitial();
            }, []);

            const resetAppToHome = () => {
                setMode(null);
                setStep(1);
                setSelectedDate(null);
                setSelectedTime(null);
                setFormData({ name: '', email: '', level: '已與老師聯絡', plan: '', prepaidCode: '' });
                setIsPaying(false);
                setPaymentSuccess(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleNext = () => {
                setStep(step + 1);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleBack = () => {
                if (step === 1) setMode(null);
                else setStep(step - 1);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const renderHome = () => (
                <div className="fade-in max-w-3xl mx-auto space-y-6 pt-4">
                    <h2 className="text-2xl font-serif mb-8 text-center text-ink tracking-wider font-bold">請選擇服務項目</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <button onClick={() => { setMode('purchase'); setStep(1); }} className="p-8 line-border bg-white hover:border-[#C19A6B] hover:shadow-md transition-all text-left flex flex-col group items-start outline-none">
                            <div className="w-16 h-16 bg-[#FAF7F2] rounded-2xl flex items-center justify-center text-3xl mb-6">🛍️</div>
                            <h3 className="text-2xl font-serif text-[#4A3F35] font-bold mb-3 tracking-widest">購買課程</h3>
                            <p className="text-sm text-[#8C7E71] tracking-widest leading-relaxed">適合首次購買體驗的同學。</p>
                        </button>
                        <button onClick={() => { setMode('book'); setStep(1); }} className="p-8 line-border bg-white hover:border-[#C19A6B] hover:shadow-md transition-all text-left flex flex-col group items-start outline-none">
                            <div className="w-16 h-16 bg-[#FAF7F2] rounded-2xl flex items-center justify-center text-3xl mb-6">📅</div>
                            <h3 className="text-2xl font-serif text-[#4A3F35] font-bold mb-3 tracking-widest">預約上課</h3>
                            <p className="text-sm text-[#8C7E71] tracking-widest leading-relaxed">已有代碼的同學排課專用。</p>
                        </button>
                    </div>
                </div>
            );

            const renderBookStep3 = () => (
                <div className="fade-in max-w-lg mx-auto space-y-6">
                    <div className="p-8 line-border bg-white relative">
                        <h3 className="text-xl font-serif mb-8 text-center tracking-widest border-b-2 border-mocha pb-4 text-ink font-bold">確認預約明細</h3>
                        <div className="space-y-4 pb-6 mb-6 text-sm border-b-2 border-mocha">
                            <div className="flex justify-between items-center pb-2 border-b border-mocha/40">
                                <span className="text-ink-light tracking-widest text-xs font-bold">上課時間</span>
                                <span className="font-sans text-ink font-bold text-[15px]">{formatDisplayDate(selectedDate)} {selectedTime}</span>
                            </div>
                            <div className="space-y-2 pt-2">
                                <label className="block text-ink-light tracking-widest text-xs font-bold">填寫課程包專屬代碼 <span className="text-accent">*</span></label>
                                <input 
                                    type="text" 
                                    name="prepaidCode"
                                    value={formData.prepaidCode}
                                    onChange={(e) => setFormData({...formData, prepaidCode: e.target.value})}
                                    className="w-full bg-milk border-2 border-mocha px-4 py-3 focus:outline-none focus:border-ink transition-colors placeholder-gray-400 text-ink font-sans font-bold rounded-xl shadow-sm tracking-widest text-base"
                                    placeholder="請輸入代碼"
                                />
                            </div>
                        </div>
                        {isPaying ? (
                             <div className="w-full py-4 border-2 border-[#4A3F35] bg-white flex items-center justify-center space-x-3 rounded-full">
                                <div className="loader"></div>
                             </div>
                        ) : (
                            <button 
                                onClick={handlePayment} 
                                disabled={!formData.prepaidCode}
                                className={`w-full py-4 transition-all duration-300 font-sans tracking-widest rounded-full font-bold shadow-md outline-none border-2 ${!formData.prepaidCode ? 'bg-[#E6DED5] text-[#8C7E71] border-[#D4C4B7] cursor-not-allowed' : 'bg-[#4A3F35] border-[#4A3F35] text-white hover:bg-[#8C7E71] active:scale-95'}`}
                            >
                                確認預約課程
                            </button>
                        )}
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pt-10 px-4">
                    {!mode ? renderHome() : (
                        <div className="max-w-lg mx-auto">
                            {mode === 'book' && step === 3 ? renderBookStep3() : (
                                <div className="text-center p-10">預約流程 (步驟 {step})</div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
