<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日語家教預約 | 日文老鳥</title>
    
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
    
    <script>
        window.tailwind = {
            config: {
                theme: {
                    extend: {
                        colors: {
                            'milk': '#FAF7F2',       /* 溫暖的奶咖底色 */
                            'card': '#FFFFFF',       /* 實體白底卡片 */
                            'mocha': '#E6DED5',      /* 柔和拿鐵邊框 */
                            'mocha-dark': '#D4C4B7', /* 較深的邊框 */
                            'ink': '#4A3F35',        /* 深咖啡字體，確保清晰 */
                            'ink-light': '#8C7E71',  /* 淺咖啡說明字體 */
                            'accent': '#C19A6B',     /* 焦糖奶茶色 (主要按鈕與選取狀態) */
                            'accent-hover': '#A88256',
                            'accent-light': '#F3EDE7'/* 淺焦糖底色 (卡片選取狀態) */
                        },
                        fontFamily: {
                            'sans': ['"Noto Sans TC"', 'sans-serif'],
                            'serif': ['"Noto Serif TC"', 'serif'],
                        }
                    }
                }
            }
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;500;700&display=swap');
        
        * {
            -webkit-tap-highlight-color: transparent; /* 徹底移除手機點擊反白框 */
        }

        body {
            background-color: #FAF7F2; /* 奶咖底色 */
            background-image: 
                linear-gradient(rgba(212, 196, 183, 0.25) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 196, 183, 0.25) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #4A3F35;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E6DED5; border-radius: 4px; }

        /* 純實體白底卡片，無任何玻璃效果 */
        .line-border { 
            background-color: #FFFFFF;
            border: 2px solid #E6DED5;
            border-radius: 1.5rem;
            box-shadow: 0 8px 24px rgba(74, 63, 53, 0.04);
        }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader {
            border: 3px solid #F3EDE7;
            border-top: 3px solid #4A3F35;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn-processing {
            opacity: 0.6;
            cursor: not-allowed !important;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        const GOOGLE_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbyetnlJlnFp8atdReeRS4Rx8bA1IVDVialahLq2iHj4ARTGLAXWcgEE0otjH-edDub9mQ/exec';

        const TIME_SLOTS = ["19:00~19:50", "20:00~20:50", "21:00~21:50"];

        // 購課專用的方案列表
        const PURCHASE_PLANS = [
            { id: '1', name: '單堂課程', price: 700, originalPrice: null, tag: '', subtitle: '' },
            { id: '8', name: '8堂課程包', price: 4800, originalPrice: 5600, tag: '', subtitle: '每堂只要 NT$600' },
            { id: '20', name: '20堂課程包', price: 11000, originalPrice: 14000, tag: '', subtitle: '每堂只要 NT$550' }
        ];

        const formatDate = (date) => {
            const yyyy = date.getFullYear();
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        };

        const formatDisplayDate = (date) => {
            const days = ['日', '一', '二', '三', '四', '五', '六'];
            return `${date.getMonth() + 1}/${date.getDate()} (${days[date.getDay()]})`;
        };

        const generateDemoBookedSlots = () => {
            const slots = [];
            let currentDate = new Date(); 
            currentDate.setHours(currentDate.getHours() + 24);

            let validDaysCount = 0;
            for (let i = 0; i < 60; i++) { 
                const dayOfWeek = currentDate.getDay();
                if (dayOfWeek >= 3 && dayOfWeek <= 6) {
                    if (validDaysCount === 0) slots.push(`${formatDate(currentDate)}-19:00~19:50`);
                    if (validDaysCount === 1) slots.push(`${formatDate(currentDate)}-21:00~21:50`);
                    if (validDaysCount === 2) slots.push(`${formatDate(currentDate)}-20:00~20:50`);
                    validDaysCount++;
                }
                currentDate.setDate(currentDate.getDate() + 1);
            }
            return slots;
        };

        const StepIndicator = ({ currentStep, mode, isAdmin }) => {
            if (!mode || isAdmin) return null; 
            
            const steps = mode === 'purchase'
                ? [{ step: 1, label: '資料' }, { step: 2, label: '方案' }, { step: 3, label: '結帳' }]
                : [{ step: 1, label: '日期' }, { step: 2, label: '時段' }, { step: 3, label: '確認' }];

            const stepWidth = 100 / steps.length;
            const lineLeft = stepWidth / 2;
            const lineTotalWidth = 100 - stepWidth;
            const activeLineWidth = lineTotalWidth * ((Math.min(currentStep, steps.length) - 1) / (steps.length - 1));

            return (
                <div className="flex justify-between items-start w-full max-w-md mx-auto mb-6 font-serif text-xs md:text-sm tracking-widest relative z-10 select-none px-2">
                    <div className="absolute top-4 h-[2px] bg-[#E6DED5] -z-10" style={{ left: `${lineLeft}%`, width: `${lineTotalWidth}%` }}></div>
                    <div 
                        className="absolute top-4 h-[2px] bg-[#4A3F35] -z-10 transition-all duration-500 ease-in-out" 
                        style={{ left: `${lineLeft}%`, width: `${activeLineWidth}%` }}
                    ></div>
                    {steps.map(item => (
                        <div key={item.step} className={`flex flex-col items-center transition-all bg-[#FAF7F2] px-2 z-10 duration-300 w-full ${currentStep >= item.step ? 'text-[#4A3F35] font-bold' : 'text-[#8C7E71] opacity-60'}`}>
                            <span className={`w-8 h-8 rounded-full flex items-center justify-center mb-2 transition-all font-sans duration-300 ${currentStep >= item.step ? 'border-2 border-[#4A3F35] bg-[#4A3F35] text-white shadow-sm scale-110' : 'border-2 border-[#E6DED5] bg-white text-[#8C7E71]'}`}>
                                {item.step}
                            </span>
                            <span>{item.label}</span>
                        </div>
                    ))}
                </div>
            );
        };

        const App = () => {
            const [mode, setMode] = useState(null); 
            const [step, setStep] = useState(1);
            
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [pwdInput, setPwdInput] = useState('');
            const [pwdError, setPwdError] = useState('');
            
            const [selectedDate, setSelectedDate] = useState(null);
            const [selectedTime, setSelectedTime] = useState(null);
            
            const [formData, setFormData] = useState({ name: '', email: '', level: '已與老師聯絡', plan: '', prepaidCode: '' });
            
            const [isPaying, setIsPaying] = useState(false);
            const [paymentSuccess, setPaymentSuccess] = useState(false);
            const [remainingClasses, setRemainingClasses] = useState(null);
            const [errorMsg, setErrorMsg] = useState("");
            const [viewDate, setViewDate] = useState(new Date());

            const [isToggling, setIsToggling] = useState(false); 
            const [togglingSlots, setTogglingSlots] = useState({});

            const resetAppToHome = () => {
                setMode(null);
                setStep(1);
                setSelectedDate(null);
                setSelectedTime(null);
                setFormData({ name: '', email: '', level: '已與老師聯絡', plan: '', prepaidCode: '' });
                setIsPaying(false);
                setPaymentSuccess(false);
                setRemainingClasses(null);
                setErrorMsg("");
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const initialBookedSlots = useMemo(() => generateDemoBookedSlots(), []);
            
            const [bookedSlots, setBookedSlots] = useState(() => {
                try {
                    const saved = localStorage.getItem('japanese_tutor_booked_slots');
                    return saved ? (JSON.parse(saved) || []) : [];
                } catch(e) { return []; }
            });
            const [closedDays, setClosedDays] = useState(() => {
                try {
                    const saved = localStorage.getItem('japanese_tutor_closed_days');
                    return saved ? (JSON.parse(saved) || []) : [];
                } catch(e) { return []; }
            });
            
            const [isLoadingSlots, setIsLoadingSlots] = useState(true);
            const lastLocalUpdate = useRef(0);

            useEffect(() => {
                localStorage.setItem('japanese_tutor_booked_slots', JSON.stringify(bookedSlots));
            }, [bookedSlots]);

            useEffect(() => {
                localStorage.setItem('japanese_tutor_closed_days', JSON.stringify(closedDays));
            }, [closedDays]);

            const fetchBookedSlots = useCallback(async (force = false) => {
                if (!force && Date.now() - lastLocalUpdate.current < 15000) {
                    return; 
                }
                if (!GOOGLE_WEBHOOK_URL) {
                    setBookedSlots(prev => prev.length === 0 ? initialBookedSlots : prev);
                    setIsLoadingSlots(false);
                    return;
                }
                try {
                    const response = await fetch(GOOGLE_WEBHOOK_URL, {
                        method: 'POST',
                        redirect: 'follow',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ type: 'get_slots' })
                    });
                    
                    const text = await response.text();
                    let result = null;
                    try { result = JSON.parse(text); } catch (e) {}

                    if (result) {
                        if (Array.isArray(result.slots)) setBookedSlots(result.slots);
                        if (Array.isArray(result.closedDays)) setClosedDays(result.closedDays);
                    }
                } catch (error) {
                    setBookedSlots(prev => prev.length === 0 ? initialBookedSlots : prev);
                } finally {
                    setIsLoadingSlots(false);
                }
            }, [initialBookedSlots]);

            useEffect(() => {
                let interval;
                if (!mode || (mode === 'book' && (step === 1 || step === 2))) {
                    fetchBookedSlots();
                    if (mode === 'book' && (step === 1 || step === 2)) {
                        interval = setInterval(() => fetchBookedSlots(), 8000);
                    }
                }
                return () => { if (interval) clearInterval(interval); };
            }, [mode, step, fetchBookedSlots]);

            const prevMonth = () => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1));
            const nextMonth = () => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1));

            const handleNext = () => {
                if (mode === 'purchase') {
                    if (step === 1 && formData.name && formData.email) setStep(2);
                    else if (step === 2 && formData.plan) setStep(3);
                } else if (mode === 'book') {
                    if (step === 1 && selectedDate) setStep(2);
                    else if (step === 2 && (isAdmin || selectedTime)) setStep(3);
                }
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleBack = () => {
                if (step === 1) {
                    setMode(null);
                } else {
                    setStep(step - 1);
                }
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handlePayment = async () => {
                setIsPaying(true);
                setErrorMsg("");
                
                if (mode === 'book') {
                    if (GOOGLE_WEBHOOK_URL) {
                        try {
                            const response = await fetch(GOOGLE_WEBHOOK_URL, {
                                method: 'POST',
                                redirect: 'follow',
                                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                body: JSON.stringify({
                                    type: 'book_class',
                                    name: '', 
                                    email: '', 
                                    level: formData.level,
                                    date: formatDate(selectedDate),
                                    displayDate: formatDisplayDate(selectedDate), 
                                    time: selectedTime,
                                    code: formData.prepaidCode
                                })
                            });
                            
                            const result = await response.json(); 

                            if (result.status === 'success') {
                                setRemainingClasses(result.remaining);
                                setIsPaying(false);
                                setPaymentSuccess(true);
                                const slotKey = `${formatDate(selectedDate)}-${selectedTime}`;
                                setBookedSlots(prev => [...prev, slotKey]);
                            } else {
                                setIsPaying(false);
                                setErrorMsg("預約失敗：" + result.message);
                            }
                        } catch (e) {
                            setIsPaying(false);
                            setErrorMsg("連線發生錯誤，請稍後再試。");
                        }
                    }
                } else if (mode === 'purchase') {
                    let paymentUrl = '';
                    if (formData.plan === '1') paymentUrl = 'https://p.ecpay.com.tw/6032D8C';
                    else if (formData.plan === '8') paymentUrl = 'https://p.ecpay.com.tw/8D937B9';
                    else if (formData.plan === '20') paymentUrl = 'https://p.ecpay.com.tw/5B755BA';

                    if (paymentUrl) window.open(paymentUrl, '_blank');

                    if (GOOGLE_WEBHOOK_URL) {
                        try {
                            const selectedPlanName = PURCHASE_PLANS.find(p => p.id === formData.plan)?.name || '';
                            fetch(GOOGLE_WEBHOOK_URL, {
                                method: 'POST',
                                redirect: 'follow',
                                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                body: JSON.stringify({
                                    type: 'new_purchase', 
                                    name: formData.name,
                                    email: formData.email,
                                    level: formData.level,
                                    date: '',
                                    displayDate: '',
                                    time: '',
                                    plan: selectedPlanName
                                })
                            });
                        } catch (e) {}
                    }

                    setTimeout(() => {
                        setIsPaying(false);
                        setPaymentSuccess(true);
                    }, 1000);
                }
            };

            const handleInputChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
            };

            const renderHome = () => (
                <div className="fade-in max-w-4xl mx-auto space-y-6 pt-4">
                    <h2 className="text-2xl font-serif mb-8 text-center text-ink tracking-wider font-bold">請選擇服務項目</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-10">
                        <button onClick={() => { setMode('purchase'); setStep(1); window.scrollTo({ top: 0, behavior: 'smooth' }); }} className="p-8 pb-10 line-border bg-white hover:border-[#C19A6B] hover:-translate-y-1 transition-all duration-300 text-center flex flex-col group items-center outline-none shadow-sm relative w-full">
                            {/* 裝飾小圓點 */}
                            <div className="absolute top-16 left-12 w-2 h-2 rounded-full bg-[#F3EDE7] opacity-60"></div>
                            <div className="absolute top-12 right-14 w-3 h-3 rounded-full bg-[#FAF7F2] opacity-80"></div>
                            
                            <div className="w-24 h-24 rounded-[2rem] border-2 border-dashed border-[#E6DED5] flex items-center justify-center text-5xl mb-6 group-hover:scale-105 group-hover:border-[#C19A6B] group-hover:bg-[#FAF7F2] transition-all relative">
                                <span className="absolute">🛍️</span>
                                <span className="absolute bottom-2 right-2 text-2xl drop-shadow-md">✨</span>
                            </div>
                            
                            <h3 className="text-[26px] font-serif text-[#4A3F35] font-bold mb-3 tracking-widest">報名課程</h3>
                            
                            {/* 標題下方的點狀裝飾 */}
                            <div className="flex gap-1.5 mb-5 justify-center">
                                <div className="w-1.5 h-1.5 rounded-full bg-[#E6DED5] group-hover:bg-[#C19A6B] transition-colors"></div>
                                <div className="w-1.5 h-1.5 rounded-full bg-[#E6DED5] group-hover:bg-[#C19A6B] transition-colors"></div>
                                <div className="w-1.5 h-1.5 rounded-full bg-[#D4C4B7] group-hover:bg-[#C19A6B] transition-colors"></div>
                                <div className="w-1.5 h-1.5 rounded-full bg-[#E6DED5] group-hover:bg-[#C19A6B] transition-colors"></div>
                                <div className="w-1.5 h-1.5 rounded-full bg-[#E6DED5] group-hover:bg-[#C19A6B] transition-colors"></div>
                            </div>
                            
                            <p className="text-[13px] text-[#8C7E71] tracking-[0.1em] leading-relaxed mb-8 px-2 min-h-[40px] font-bold">
                                適合首次報名上課，或原有<br className="hidden sm:block"/>課程堂數用盡需補購的同學。
                            </p>
                            
                            <div className="mt-auto px-8 py-2.5 bg-[#FAF7F2] border border-[#E6DED5] text-[#4A3F35] rounded-full text-sm font-bold tracking-widest flex items-center justify-center group-hover:bg-[#F3EDE7] group-hover:border-[#C19A6B] transition-all w-4/5 max-w-[200px]">
                                前往報名 <span className="ml-2 text-[#C19A6B] group-hover:translate-x-1 transition-transform">❯</span>
                            </div>
                        </button>

                        <button onClick={() => { setMode('book'); setStep(1); window.scrollTo({ top: 0, behavior: 'smooth' }); }} className="p-8 pb-10 line-border bg-white hover:border-[#C19A6B] hover:-translate-y-1 transition-all duration-300 text-center flex flex-col group items-center outline-none shadow-sm relative w-full">
                            {/* 裝飾小圓點 */}
                            <div className="absolute top-16 left-12 w-2 h-2 rounded-full bg-[#F3EDE7] opacity-60"></div>
                            <div className="absolute top-12 right-14 w-3 h-3 rounded-full bg-[#FAF7F2] opacity-80"></div>
                            
                            <div className="w-24 h-24 rounded-[2rem] border-2 border-dashed border-[#E6DED5] flex items-center justify-center text-5xl mb-6 group-hover:scale-105 group-hover:border-[#C19A6B] group-hover:bg-[#FAF7F2] transition-all relative">
                                <span className="absolute">📅</span>
                                <span className="absolute bottom-2 right-2 text-2xl drop-shadow-md">📌</span>
                            </div>
                            
                            <h3 className="text-[26px] font-serif text-[#4A3F35] font-bold mb-3 tracking-widest">預約上課</h3>
                            
                            {/* 標題下方的點狀裝飾 */}
                            <div className="flex gap-1.5 mb-5 justify-center">
                                <div className="w-1.5 h-1.5 rounded-full bg-[#E6DED5] group-hover:bg-[#C19A6B] transition-colors"></div>
                                <div className="w-1.5 h-1.5 rounded-full bg-[#E6DED5] group-hover:bg-[#C19A6B] transition-colors"></div>
                                <div className="w-1.5 h-1.5 rounded-full bg-[#D4C4B7] group-hover:bg-[#C19A6B] transition-colors"></div>
                                <div className="w-1.5 h-1.5 rounded-full bg-[#E6DED5] group-hover:bg-[#C19A6B] transition-colors"></div>
                                <div className="w-1.5 h-1.5 rounded-full bg-[#E6DED5] group-hover:bg-[#C19A6B] transition-colors"></div>
                            </div>
                            
                            <p className="text-[13px] text-[#8C7E71] tracking-[0.1em] leading-relaxed mb-8 px-2 min-h-[40px] font-bold">
                                已經持有課程包專屬代碼，<br className="hidden sm:block"/>需彈性安排上課時間的同學。
                            </p>
                            
                            <div className="mt-auto px-8 py-2.5 bg-[#FAF7F2] border border-[#E6DED5] text-[#4A3F35] rounded-full text-sm font-bold tracking-widest flex items-center justify-center group-hover:bg-[#F3EDE7] group-hover:border-[#C19A6B] transition-all w-4/5 max-w-[200px]">
                                前往預約 <span className="ml-2 text-[#C19A6B] group-hover:translate-x-1 transition-transform">❯</span>
                            </div>
                        </button>
                    </div>
                    <div className="flex justify-center mt-10 pb-4">
                        <a href="https://lin.ee/OYIH1YB" target="_blank" rel="noopener noreferrer" className="hover:scale-105 active:scale-95 transition-transform drop-shadow-sm inline-block" title="加入 LINE 好友">
                            <img src="https://scdn.line-apps.com/n/line_add_friends/btn/zh-Hant.png" alt="加入好友" style={{ height: '34px' }} border="0" />
                        </a>
                    </div>
                </div>
            );

            const renderPurchaseStep1 = () => (
                <div className="fade-in max-w-lg mx-auto space-y-6">
                    <div className="text-center mb-6">
                        <h2 className="text-2xl font-serif mb-2 text-ink tracking-wider font-bold">填寫基本資料</h2>
                        <p className="text-sm text-ink-light tracking-widest font-bold">為您建立課程紀錄</p>
                    </div>
                    <div className="p-8 line-border bg-white">
                        <div className="space-y-6">
                            <div>
                                <label className="block text-sm tracking-widest text-ink mb-2 font-bold">您的稱呼 <span className="text-accent">*</span></label>
                                <input type="text" name="name" value={formData.name} onChange={handleInputChange} className="w-full bg-milk border-2 border-mocha px-4 py-3 focus:outline-none focus:border-ink focus:bg-white transition-colors placeholder-gray-400 text-ink font-sans font-bold rounded-xl" placeholder="要怎麼稱呼您"/>
                            </div>
                            <div>
                                <label className="block text-sm tracking-widest text-ink mb-2 font-bold">電子郵件 <span className="text-accent">*</span></label>
                                <input type="email" name="email" value={formData.email} onChange={handleInputChange} className="w-full bg-milk border-2 border-mocha px-4 py-3 focus:outline-none focus:border-ink focus:bg-white transition-colors placeholder-gray-400 text-ink font-sans font-bold rounded-xl" placeholder="預約後資訊將發送至此信箱"/>
                            </div>
                            <div>
                                <label className="block text-sm tracking-widest text-ink mb-2 font-bold">預約課程</label>
                                <input type="text" value="已聯絡老師" disabled className="w-full bg-gray-100 border-2 border-gray-200 px-4 py-3 text-gray-500 font-sans font-bold rounded-xl cursor-not-allowed select-none" />
                            </div>
                        </div>
                    </div>
                    <div className="flex justify-between items-center pt-4">
                        <button onClick={handleBack} className="text-sm tracking-widest text-[#8C7E71] hover:text-[#4A3F35] transition-colors flex items-center font-bold px-4 py-2 select-none outline-none">返回首頁</button>

                                    <React.Fragment>
                                        <span className="text-ink bg-accent-light px-4 py-2 rounded-lg font-bold my-3 inline-block border border-accent">本次扣除 1 堂，課程包剩餘：{remainingClasses} 堂</span><br/>
                                        <span className="text-sm mt-2 mb-4 inline-block text-ink bg-milk p-4 rounded-xl">🔔 預約資訊與上課連結已寄至您的信箱囉！<br/>若有任何問題請與老師聯絡。</span>
                                    </React.Fragment>
                                ) : (
                                    <span>老師將在確認剩餘堂數後與您聯繫</span>
                                )}
                            </div>
                            <button onClick={resetAppToHome} className="w-full py-4 mt-2 bg-white text-ink border-2 border-mocha hover:border-ink hover:text-ink transition-colors font-sans tracking-widest text-sm rounded-full font-bold select-none shadow-sm outline-none">回到首頁</button>
                        </div>
                    );
                }

                return (
                    <div className="fade-in max-w-lg mx-auto space-y-6">
                        <div className="p-8 line-border bg-white relative">
                            <h3 className="text-[22px] font-serif mb-8 text-center tracking-widest border-b-2 border-mocha pb-4 text-ink font-bold">確認預約明細</h3>
                            <div className="space-y-4 pb-6 mb-6 border-b-2 border-mocha">
                                <div className="flex justify-between items-center pb-2 border-b border-mocha/40">
                                    <span className="text-ink-light tracking-widest text-[14px] font-bold">上課時間</span><span className="font-sans text-ink font-bold text-[15px]">{formatDisplayDate(selectedDate)} {selectedTime}</span>
                                </div>
                                <div className="flex flex-col pt-2">
                                    <label className="text-ink-light tracking-widest text-[14px] font-bold mb-2">課程代碼 <span className="text-accent">*</span></label>
                                    <input 
                                        type="text" 
                                        name="prepaidCode"
                                        value={formData.prepaidCode}
                                        onChange={handleInputChange}
                                        className="w-full bg-milk border-2 border-mocha px-4 py-3 focus:outline-none focus:border-ink transition-colors placeholder-gray-400 text-ink font-sans font-bold rounded-xl shadow-sm tracking-widest text-[18px]"
                                        placeholder="請輸入您的課程包代碼"
                                    />
                                </div>
                            </div>
                            <div className="flex justify-between items-end mb-6 bg-milk p-4 rounded-xl border border-mocha">
                                <span className="font-sans text-[14px] tracking-widest text-ink-light font-bold">扣除堂數</span><span className="text-[17px] font-sans text-ink tracking-wider font-bold whitespace-nowrap">1 堂</span>
                            </div>
                            {errorMsg && <div className="mb-6 text-center text-red-600 bg-red-50 py-3 rounded-lg border border-red-200 text-sm tracking-widest font-bold">{errorMsg}</div>}
                            {isPaying ? (
                                <div className="w-full py-4 border-2 border-[#4A3F35] bg-white flex items-center justify-center space-x-3 rounded-full"><div className="loader"></div><span className="text-sm tracking-widest text-[#4A3F35] font-bold">處理中...</span></div>
                            ) : (
                                <button 
                                    onClick={handlePayment} 
                                    disabled={!formData.prepaidCode.trim()}
                                    className={`w-full py-4 transition-all duration-300 font-sans tracking-widest flex items-center justify-center text-[18px] rounded-full shadow-md font-bold select-none outline-none border-2 ${!formData.prepaidCode.trim() ? 'bg-[#E6DED5] text-[#8C7E71] border-[#D4C4B7] cursor-not-allowed' : 'bg-[#4A3F35] border-[#4A3F35] text-white hover:bg-[#8C7E71] active:scale-95'}`}
                                >
                                    確認預約課程
                                </button>
                            )}
                        </div>
                        {!isPaying && (
                            <div className="flex justify-center"><button onClick={handleBack} className="text-sm tracking-widest text-[#8C7E71] hover:text-[#4A3F35] transition-colors px-4 py-2 font-bold select-none outline-none">返回修改時段</button></div>
                        )}
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col font-sans relative">
                    {showLogin && (
                        <div className="fixed inset-0 bg-[#4A3F35]/40 z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl p-8 w-full max-w-xs shadow-2xl border-2 border-[#E6DED5] fade-in text-center">
                                <h3 className="font-serif text-[#4A3F35] tracking-widest mb-6 font-bold text-lg">進入後台管理</h3>
                                <input type="password" value={pwdInput} onChange={(e) => { setPwdInput(e.target.value); setPwdError(''); }} placeholder="請輸入密碼" className="w-full text-center border-2 border-[#E6DED5] px-4 py-3 mb-2 focus:outline-none focus:border-[#4A3F35] rounded-lg transition-all bg-[#FAF7F2] font-sans text-[#4A3F35] font-bold outline-none" />
                                {pwdError && <p className="text-red-500 text-xs mt-2 mb-2 font-bold">{pwdError}</p>}
                                <div className="flex justify-between mt-8 space-x-3">
                                    <button onClick={() => { setShowLogin(false); setPwdInput(''); setPwdError(''); }} className="flex-1 py-3 text-[#8C7E71] hover:bg-[#FAF7F2] rounded-xl text-sm tracking-widest transition-colors font-bold bg-white border-2 border-[#E6DED5] hover:border-[#4A3F35] outline-none">取消</button>
                                    <button onClick={() => {
                                        if (pwdInput === '121314') {
                                            setIsAdmin(true); setShowLogin(false); setPwdInput(''); setMode('book'); setStep(1); 
                                        } else { setPwdError('密碼錯誤'); }
                                    }} className="flex-1 py-3 text-[#4A3F35] hover:bg-[#FAF7F2] rounded-xl text-sm tracking-widest transition-colors font-bold bg-white border-2 border-[#E6DED5] hover:border-[#4A3F35] outline-none">登入</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <header className="pt-6 pb-4 text-center relative select-none">
                        <button 
                            onClick={() => {
                                if (isAdmin) {
                                    setIsAdmin(false);
                                    lastLocalUpdate.current = Date.now();
                                    setMode('book'); setStep(1); setSelectedDate(null); setSelectedTime(null);
                                } else { setShowLogin(true); }
                            }}
                            className="absolute top-4 right-4 w-10 h-10 flex items-center justify-center text-ink-light border-2 border-transparent hover:border-mocha hover:text-ink hover:bg-white rounded-full transition-all font-bold outline-none"
                        >
                            {isAdmin ? <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5 stroke-[2.5]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg> : <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5 stroke-[2.5]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>}
                        </button>
                        <h1 onClick={resetAppToHome} className="text-3xl md:text-4xl font-serif text-ink tracking-[0.15em] font-bold cursor-pointer hover:opacity-80 transition-opacity inline-block">日文老鳥</h1>
                        <p className="text-[10px] md:text-[12px] font-sans tracking-[0.4em] text-ink-light uppercase flex items-center justify-center mt-3 font-bold">
                            <span className="w-8 h-[2px] bg-mocha mr-3"></span>日語線上家教 Vivi老師<span className="w-8 h-[2px] bg-mocha ml-3"></span>
                        </p>
                    </header>

                    <main className="flex-1 container mx-auto px-4 max-w-5xl pb-10 flex flex-col">
                        {!paymentSuccess && <StepIndicator currentStep={step} mode={mode} isAdmin={isAdmin} />}
                        <div className="transition-all duration-500 w-full flex-1">
                            {!mode && renderHome()}
                            {mode === 'purchase' && step === 1 && renderPurchaseStep1()}
                            {mode === 'purchase' && step === 2 && renderPurchaseStep2()}
                            {mode === 'purchase' && step === 3 && renderPurchaseStep3()}
                            {mode === 'book' && step === 1 && renderBookStep1()}
                            {mode === 'book' && step === 2 && renderBookStep2()}
                            {mode === 'book' && step === 3 && renderBookStep3()}
                        </div>
                    </main>

                    <footer className="py-4 text-center border-t-2 border-mocha mt-auto">
                        <p className="text-[10px] text-ink-light font-sans tracking-[0.2em] font-bold select-none">&copy; 2026 objapanese</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
