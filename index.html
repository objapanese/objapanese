<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日語家教預約 | 日文老鳥</title>
    
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
    
    <script>
        window.tailwind = {
            config: {
                theme: {
                    extend: {
                        colors: {
                            'milk': '#FAF7F2',       /* 溫暖的奶咖底色 */
                            'card': '#FFFFFF',       /* 實體白底卡片 */
                            'mocha': '#E6DED5',      /* 柔和拿鐵邊框 */
                            'mocha-dark': '#D4C4B7', /* 較深的邊框 */
                            'ink': '#4A3F35',        /* 深咖啡字體，確保清晰 */
                            'ink-light': '#8C7E71',  /* 淺咖啡說明字體 */
                            'accent': '#C19A6B',     /* 焦糖奶茶色 (主要按鈕與選取狀態) */
                            'accent-hover': '#A88256',
                            'accent-light': '#F3EDE7'/* 淺焦糖底色 (卡片選取狀態) */
                        },
                        fontFamily: {
                            'sans': ['"Noto Sans TC"', 'sans-serif'],
                            'serif': ['"Noto Serif TC"', 'serif'],
                        }
                    }
                }
            }
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;500;700&display=swap');
        
        * {
            -webkit-tap-highlight-color: transparent; /* 徹底移除手機點擊反白框 */
        }

        body {
            background-color: #FAF7F2; /* 奶咖底色 */
            background-image: 
                linear-gradient(rgba(212, 196, 183, 0.25) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 196, 183, 0.25) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #4A3F35;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E6DED5; border-radius: 4px; }

        /* 純實體白底卡片，無任何玻璃效果 */
        .line-border { 
            background-color: #FFFFFF;
            border: 2px solid #E6DED5;
            border-radius: 1.5rem;
            box-shadow: 0 8px 24px rgba(74, 63, 53, 0.04);
        }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader {
            border: 3px solid #F3EDE7;
            border-top: 3px solid #4A3F35;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const TIME_SLOTS = ["19:00~19:50", "20:00~20:50", "21:00~21:50"];

        const PLANS = [
            { id: '1', name: '單堂課程', price: 700, originalPrice: null, tag: '' },
            { id: '4', name: '4堂課程包', price: 2600, originalPrice: 2800, tag: '一堂課只要650元' },
            { id: '8', name: '8堂課程包', price: 4800, originalPrice: 5600, tag: '一堂課只要600元' },
            { id: 'prepaid', name: '使用已購課程包預約', price: 0, originalPrice: null, tag: '請輸入專屬代碼' }
        ];

        const formatDate = (date) => {
            const yyyy = date.getFullYear();
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        };

        const formatDisplayDate = (date) => {
            const days = ['日', '一', '二', '三', '四', '五', '六'];
            return `${date.getMonth() + 1}/${date.getDate()} (${days[date.getDay()]})`;
        };

        const generateDemoBookedSlots = () => {
            const slots = [];
            let currentDate = new Date(); 
            if (currentDate.getHours() >= 21) {
                currentDate.setDate(currentDate.getDate() + 1);
            }
            let validDaysCount = 0;
            for (let i = 0; i < 60; i++) { // 測試假資料域也延長到60天
                const dayOfWeek = currentDate.getDay();
                if (dayOfWeek === 0 || (dayOfWeek >= 3 && dayOfWeek <= 6)) {
                    if (validDaysCount === 0) slots.push(`${formatDate(currentDate)}-19:00~19:50`);
                    if (validDaysCount === 1) slots.push(`${formatDate(currentDate)}-21:00~21:50`);
                    if (validDaysCount === 2) slots.push(`${formatDate(currentDate)}-20:00~20:50`);
                    validDaysCount++;
                }
                currentDate.setDate(currentDate.getDate() + 1);
            }
            return slots;
        };

        const StepIndicator = ({ currentStep }) => (
            <div className="flex items-center justify-center space-x-2 md:space-x-4 mb-12 font-serif text-xs md:text-sm tracking-widest relative z-10 select-none">
                <div className={`flex flex-col items-center transition-all px-2 py-1 bg-[#FAF7F2] z-10 ${currentStep >= 1 ? 'text-[#4A3F35] font-bold' : 'text-[#8C7E71] opacity-60'}`}>
                    <span className={`w-8 h-8 rounded-full flex items-center justify-center mb-2 transition-all font-sans ${currentStep >= 1 ? 'border-2 border-[#4A3F35] bg-[#4A3F35] text-white shadow-sm' : 'border-2 border-[#E6DED5] bg-white text-[#8C7E71]'}`}>1</span>
                    <span>時間選擇</span>
                </div>
                <div className={`absolute left-1/2 top-4 md:top-5 -translate-x-1/2 w-1/3 md:w-1/4 h-[2px] -z-10 transition-all ${currentStep >= 2 ? 'bg-[#4A3F35]' : 'bg-[#E6DED5]'}`}></div>
                <div className={`flex flex-col items-center transition-all px-2 py-1 bg-[#FAF7F2] z-10 ${currentStep >= 2 ? 'text-[#4A3F35] font-bold' : 'text-[#8C7E71] opacity-60'}`}>
                    <span className={`w-8 h-8 rounded-full flex items-center justify-center mb-2 transition-all font-sans ${currentStep >= 2 ? 'border-2 border-[#4A3F35] bg-[#4A3F35] text-white shadow-sm' : 'border-2 border-[#E6DED5] bg-white text-[#8C7E71]'}`}>2</span>
                    <span>學生資料</span>
                </div>
                <div className={`absolute left-1/2 top-4 md:top-5 ml-[16.6%] md:ml-[12.5%] w-1/3 md:w-1/4 h-[2px] -z-10 transition-all ${currentStep >= 3 ? 'bg-[#4A3F35]' : 'bg-[#E6DED5]'}`}></div>
                <div className={`flex flex-col items-center transition-all px-2 py-1 bg-[#FAF7F2] z-10 ${currentStep >= 3 ? 'text-[#4A3F35] font-bold' : 'text-[#8C7E71] opacity-60'}`}>
                    <span className={`w-8 h-8 rounded-full flex items-center justify-center mb-2 transition-all font-sans ${currentStep >= 3 ? 'border-2 border-[#4A3F35] bg-[#4A3F35] text-white shadow-sm' : 'border-2 border-[#E6DED5] bg-white text-[#8C7E71]'}`}>3</span>
                    <span>確認結帳</span>
                </div>
            </div>
        );

        const App = () => {
            const [step, setStep] = useState(1);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [pwdInput, setPwdInput] = useState('');
            const [pwdError, setPwdError] = useState('');
            const [selectedDate, setSelectedDate] = useState(null);
            const [selectedTime, setSelectedTime] = useState(null);
            const [formData, setFormData] = useState({ name: '', email: '', level: '', plan: '', prepaidCode: '' });
            const [isPaying, setIsPaying] = useState(false);
            const [paymentSuccess, setPaymentSuccess] = useState(false);
            const [remainingClasses, setRemainingClasses] = useState(null);
            const [errorMsg, setErrorMsg] = useState("");
            const [viewDate, setViewDate] = useState(new Date());

            const initialBookedSlots = useMemo(() => generateDemoBookedSlots(), []);
            const [bookedSlots, setBookedSlots] = useState(initialBookedSlots);
            // 新增狀態：存放被整天關閉的日期 (格式 YYYY-MM-DD)
            const [closedDays, setClosedDays] = useState([]);

            const prevMonth = () => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1));
            const nextMonth = () => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1));

            const handleNext = () => {
                if (step === 1 && selectedDate && selectedTime) {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    setStep(2);
                }
                if (step === 2 && formData.name && formData.email && formData.level) {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    setStep(3);
                }
            };

            const handleBack = () => {
                if (step > 1) {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    setStep(step - 1);
                }
            };

            const handlePayment = async () => {
                // 優先執行開啟結帳視窗，避免被 Safari 阻擋彈出視窗
                let newWindow = null;
                if (formData.plan !== 'prepaid') {
                    let paymentUrl = '';
                    if (formData.plan === '1') paymentUrl = 'https://p.ecpay.com.tw/6032D8C';
                    else if (formData.plan === '4') paymentUrl = 'https://p.ecpay.com.tw/8510797';
                    else if (formData.plan === '8') paymentUrl = 'https://p.ecpay.com.tw/8D937B9';

                    if (paymentUrl) {
                        newWindow = window.open(paymentUrl, '_blank');
                    }
                }

                setIsPaying(true);
                setErrorMsg("");
                
                const GOOGLE_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbyetnlJlnFp8atdReeRS4Rx8bA1IVDVialahLq2iHj4ARTGLAXWcgEE0otjH-edDub9mQ/exec';
                
                if (formData.plan === 'prepaid') {
                    if (GOOGLE_WEBHOOK_URL) {
                        try {
                            const response = await fetch(GOOGLE_WEBHOOK_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                body: JSON.stringify({
                                    type: 'book_class',
                                    name: formData.name,
                                    email: formData.email,
                                    level: formData.level,
                                    date: formatDisplayDate(selectedDate),
                                    time: selectedTime,
                                    code: formData.prepaidCode
                                })
                            });
                            
                            const result = await response.json(); 

                            if (result.status === 'success') {
                                setRemainingClasses(result.remaining);
                                setIsPaying(false);
                                setPaymentSuccess(true);
                                const slotKey = `${formatDate(selectedDate)}-${selectedTime}`;
                                setBookedSlots([...bookedSlots, slotKey]);
                            } else {
                                setIsPaying(false);
                                setErrorMsg("預約失敗：" + result.message);
                            }
                        } catch (e) {
                            console.error('送出失敗', e);
                            setIsPaying(false);
                            setErrorMsg("連線發生錯誤，請稍後再試。");
                        }
                    }
                } else {
                    if (GOOGLE_WEBHOOK_URL) {
                        try {
                            const selectedPlanName = PLANS.find(p => p.id === formData.plan).name;
                            fetch(GOOGLE_WEBHOOK_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                body: JSON.stringify({
                                    type: 'new_purchase', 
                                    name: formData.name,
                                    email: formData.email,
                                    level: formData.level,
                                    date: formatDisplayDate(selectedDate),
                                    time: selectedTime,
                                    plan: selectedPlanName
                                })
                            });
                        } catch (e) {
                            console.error('拋送待付款資料失敗', e);
                        }
                    }

                    setTimeout(() => {
                        setIsPaying(false);
                        setPaymentSuccess(true);
                        const slotKey = `${formatDate(selectedDate)}-${selectedTime}`;
                        setBookedSlots([...bookedSlots, slotKey]);
                    }, 1000);
                }
            };

            const handleInputChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
            };

            const renderStep1 = () => {
                const year = viewDate.getFullYear();
                const month = viewDate.getMonth();
                const rawFirstDay = new Date(year, month, 1).getDay();
                const firstDayIndex = (rawFirstDay + 6) % 7; 
                const daysInMonth = new Date(year, month + 1, 0).getDate();

                const today = new Date();
                if (new Date().getHours() >= 21) today.setDate(today.getDate() + 1);
                today.setHours(0, 0, 0, 0);
                
                const maxDate = new Date(today);
                maxDate.setMonth(maxDate.getMonth() + 2); // 改為往後開放兩個月

                const calendarDays = [];
                const weekDays = ['一', '二', '三', '四', '五', '六', '日'];

                for (let i = 0; i < firstDayIndex; i++) {
                    calendarDays.push(<div key={`blank-${i}`} className="p-2"></div>);
                }

                for (let d = 1; d <= daysInMonth; d++) {
                    const currentDate = new Date(year, month, d);
                    currentDate.setHours(0, 0, 0, 0);
                    
                    const isPast = currentDate < today;
                    const isTooFar = currentDate > maxDate;
                    const dayOfWeek = currentDate.getDay();
                    const isAvailableDay = dayOfWeek !== 1 && dayOfWeek !== 2; 
                    const dateStr = formatDate(currentDate);
                    const isDayClosed = closedDays.includes(dateStr); // 判斷是否整天關閉
                    
                    // 前台判斷：過去、太遠、一二休假、或是被特別關閉的都不能點
                    const isBookable = !isPast && !isTooFar && isAvailableDay && !isDayClosed;
                    
                    // 後台判斷：只要不是過去、太遠、一二休假，都可以點（即使被關閉了，後台也要能點擊來取消關閉）
                    const isClickable = isAdmin ? (!isPast && !isTooFar && isAvailableDay) : isBookable;

                    const isSelected = selectedDate && selectedDate.getDate() === d && selectedDate.getMonth() === month && selectedDate.getFullYear() === year;

                    calendarDays.push(
                        <div key={d} className="flex justify-center py-1">
                            <button 
                                disabled={!isClickable}
                                onClick={() => { setSelectedDate(currentDate); setSelectedTime(null); }}
                                className={`w-9 h-9 rounded-full flex items-center justify-center text-sm font-sans font-bold transition-all duration-300 select-none outline-none
                                    ${!isClickable ? 'text-gray-300 cursor-not-allowed' : 
                                      isSelected ? 'bg-[#4A3F35] text-white shadow-md border-2 border-[#4A3F35]' : 
                                      (isAdmin && isDayClosed) ? 'text-gray-400 bg-gray-100 hover:border-gray-300 border-2 border-transparent' :
                                      'text-[#4A3F35] bg-white border-2 border-transparent hover:border-[#E6DED5] hover:bg-[#FAF7F2]'}
                                `}
                            >
                                {d}
                            </button>
                        </div>
                    );
                }

                const isCurrentDayClosed = selectedDate ? closedDays.includes(formatDate(selectedDate)) : false;

                return (
                    <div className="fade-in space-y-8 max-w-4xl mx-auto">
                        {isAdmin && (
                            <div className="mb-2 bg-accent-light border border-accent rounded-2xl p-4 text-center text-ink text-sm tracking-widest fade-in font-bold">
                                🔧 後台管理模式：點擊下方時段即可自由切換「開放」或「關閉」。
                            </div>
                        )}
                        <div className="text-center mb-10">
                            <h2 className="text-2xl font-serif mb-3 text-ink tracking-wider font-bold">選擇上課時間</h2>
                            <div className="flex items-center justify-center space-x-4 text-xs tracking-widest text-ink-light font-bold">
                                <span className="flex items-center"><span className="w-3 h-3 rounded-full bg-white border-2 border-mocha mr-2"></span>可預約</span>
                                <span className="flex items-center"><span className="w-3 h-3 rounded-full bg-gray-200 border-2 border-gray-300 mr-2"></span>已額滿</span>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-5 gap-6">
                            <div className="md:col-span-2 p-6 line-border flex flex-col relative">
                                <h3 className="text-lg font-serif mb-4 text-center tracking-widest border-b-2 border-mocha pb-4 font-bold text-ink">日期</h3>
                                
                                <div className="flex justify-between items-center mb-4 px-2 select-none">
                                    <button onClick={prevMonth} className="p-1 text-ink-light hover:text-ink transition-colors outline-none">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6 stroke-[2.5]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7" /></svg>
                                    </button>
                                    <span className="font-sans tracking-widest text-ink font-bold">{year}年 {month + 1}月</span>
                                    <button onClick={nextMonth} className="p-1 text-ink-light hover:text-ink transition-colors outline-none">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6 stroke-[2.5]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7" /></svg>
                                    </button>
                                </div>

                                <div className="grid grid-cols-7 gap-1 mb-2 text-center text-xs text-ink-light tracking-widest border-b-2 border-mocha pb-2 font-bold select-none">
                                    {weekDays.map(wd => <div key={wd}>{wd}</div>)}
                                </div>
                                <div className="grid grid-cols-7 gap-y-2 mt-2">
                                    {calendarDays}
                                </div>
                            </div>

                            <div className="md:col-span-3 p-6 line-border flex flex-col relative">
                                <h3 className="text-lg font-serif mb-6 text-center tracking-widest border-b-2 border-mocha pb-4 font-bold text-ink">時段</h3>
                                
                                {!selectedDate ? (
                                    <div className="flex-1 flex flex-col items-center justify-center text-ink-light min-h-[250px] select-none">
                                        <p className="tracking-widest text-sm font-sans font-bold bg-milk px-6 py-3 rounded-full border border-mocha">請先從左側選擇日期</p>
                                    </div>
                                ) : (
                                    <div className="flex-1 flex flex-col min-h-[250px]">
                                        {/* 後台專用：關閉整天時段按鈕 */}
                                        {isAdmin && (
                                            <button
                                                onClick={() => {
                                                    const dateStr = formatDate(selectedDate);
                                                    if (isCurrentDayClosed) {
                                                        setClosedDays(closedDays.filter(d => d !== dateStr));
                                                    } else {
                                                        setClosedDays([...closedDays, dateStr]);
                                                    }
                                                }}
                                                className={`w-full group relative flex items-center justify-between px-8 py-4 mb-6 border-2 transition-all duration-300 rounded-xl select-none outline-none
                                                    ${isCurrentDayClosed 
                                                        ? 'bg-gray-100 border-gray-300 text-gray-500' 
                                                        : 'bg-white border-[#E6DED5] hover:border-red-300 hover:bg-red-50 text-[#4A3F35]'}
                                                `}
                                            >
                                                <span className="text-lg font-sans tracking-widest font-bold">
                                                    {isCurrentDayClosed ? '整天已關閉' : '關閉整天時段'}
                                                </span>
                                                <span className={`text-xs tracking-widest px-4 py-2 transition-colors rounded-lg font-bold
                                                    ${isCurrentDayClosed 
                                                        ? 'bg-white text-gray-500 border-2 border-gray-300' 
                                                        : 'bg-white text-[#8C7E71] border-2 border-[#E6DED5] group-hover:border-red-400 group-hover:text-red-500'}
                                                `}>
                                                    {isCurrentDayClosed ? '點擊重新開放' : '點擊關閉'}
                                                </span>
                                            </button>
                                        )}

                                        {/* 當整天被關閉時，下方時段變半透明不可點擊 */}
                                        <div className={`space-y-4 flex-1 flex flex-col justify-center transition-opacity duration-300 ${isCurrentDayClosed ? 'opacity-30 pointer-events-none' : ''}`}>
                                            {TIME_SLOTS.map((time, idx) => {
                                                const slotKey = `${formatDate(selectedDate)}-${time}`;
                                                const isBooked = bookedSlots.includes(slotKey);
                                                const isSelected = !isAdmin && selectedTime === time;

                                                return (
                                                    <button
                                                        key={idx}
                                                        disabled={!isAdmin && isBooked}
                                                        onClick={() => {
                                                            if (isAdmin) {
                                                                const newBooked = isBooked ? bookedSlots.filter(k => k !== slotKey) : [...bookedSlots, slotKey];
                                                                setBookedSlots(newBooked);
                                                            } else {
                                                                setSelectedTime(time);
                                                            }
                                                        }}
                                                        className={`w-full group relative flex items-center justify-between px-8 py-5 border-2 transition-all duration-300 rounded-xl select-none outline-none
                                                            ${isBooked ? (isAdmin ? 'bg-red-50 border-red-300 text-red-800' : 'bg-[#F3F4F6] border-[#E5E7EB] cursor-not-allowed opacity-70') : 
                                                              isSelected ? 'bg-[#F3EDE7] border-[#C19A6B] text-[#4A3F35] shadow-sm' : 'bg-white border-[#E6DED5] hover:border-[#C19A6B] hover:bg-[#FAF7F2] text-[#4A3F35]'}
                                                        `}
                                                    >
                                                        <span className={`text-xl font-sans tracking-widest font-bold transition-colors 
                                                            ${isBooked && !isAdmin ? 'line-through text-gray-400' : 'text-[#4A3F35]'}
                                                        `}>
                                                            {time}
                                                        </span>
                                                        
                                                        <span className={`text-xs tracking-widest px-4 py-2 transition-colors rounded-lg font-bold
                                                            ${isBooked ? (isAdmin ? 'bg-red-200 text-red-700' : 'bg-[#E5E7EB] text-[#9CA3AF] border-2 border-[#D1D5DB]') : 
                                                              isSelected ? 'bg-[#C19A6B] text-white shadow-sm border-2 border-[#C19A6B]' : 'bg-white text-[#8C7E71] border-2 border-[#E6DED5] group-hover:border-[#C19A6B] group-hover:text-[#C19A6B]'}
                                                        `}>
                                                            {isBooked ? (isAdmin ? '點擊開放' : '已額滿') : (isAdmin ? '點擊關閉' : (isSelected ? '已選擇' : '可預約'))}
                                                        </span>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="flex justify-end pt-8">
                            <button 
                                onClick={handleNext}
                                disabled={!isAdmin && (!selectedDate || !selectedTime)}
                                className={`px-12 py-4 font-sans tracking-widest transition-all duration-300 rounded-full font-bold select-none outline-none
                                    ${(!isAdmin && (!selectedDate || !selectedTime)) ? 'bg-[#E6DED5] text-[#8C7E71] border-2 border-[#D4C4B7] cursor-not-allowed' : 'bg-[#4A3F35] border-2 border-[#4A3F35] text-white hover:bg-[#8C7E71] active:scale-95 shadow-lg'}
                                `}
                            >
                                下一步
                            </button>
                        </div>
                    </div>
                );
            };

            const renderStep2 = () => (
                <div className="fade-in max-w-2xl mx-auto space-y-6">
                    <div className="p-6 line-border flex flex-col md:flex-row justify-between items-start md:items-center relative bg-white">
                        <div className="absolute left-0 top-0 bottom-0 w-2 bg-ink rounded-l-xl"></div>
                        <div className="pl-4">
                            <p className="text-xs tracking-widest text-ink-light mb-2 font-bold">已選擇時段</p>
                            <p className="font-sans text-xl tracking-wider text-ink font-bold">
                                {formatDisplayDate(selectedDate)} <span className="mx-3 text-mocha">|</span> {selectedTime}
                            </p>
                        </div>
                        <button onClick={() => setStep(1)} className="mt-4 md:mt-0 px-4 py-2 text-xs tracking-widest border-2 border-mocha hover:bg-milk hover:border-ink transition-colors text-ink rounded-lg font-bold select-none outline-none">
                            重新選擇時間
                        </button>
                    </div>

                    <div className="p-8 line-border bg-white">
                        <h3 className="text-xl font-serif mb-8 text-center tracking-widest border-b-2 border-mocha pb-4 text-ink font-bold">學生資料</h3>
                        
                        <div className="space-y-6">
                            <div>
                                <label className="block text-sm tracking-widest text-ink mb-2 font-bold">您的稱呼 <span className="text-accent">*</span></label>
                                <input 
                                    type="text" 
                                    name="name"
                                    value={formData.name}
                                    onChange={handleInputChange}
                                    className="w-full bg-milk border-2 border-mocha px-4 py-3 focus:outline-none focus:border-ink focus:bg-white transition-colors placeholder-gray-400 text-ink font-sans font-bold rounded-xl"
                                    placeholder="請輸入您的稱呼"
                                />
                            </div>
                            <div>
                                <label className="block text-sm tracking-widest text-ink mb-2 font-bold">電子郵件 <span className="text-accent">*</span></label>
                                <input 
                                    type="email" 
                                    name="email"
                                    value={formData.email}
                                    onChange={handleInputChange}
                                    className="w-full bg-milk border-2 border-mocha px-4 py-3 focus:outline-none focus:border-ink focus:bg-white transition-colors placeholder-gray-400 text-ink font-sans font-bold rounded-xl"
                                    placeholder="將發送預約確認信至此信箱"
                                />
                            </div>
                            <div className="pt-2">
                                <label className="block text-sm tracking-widest text-ink mb-2 font-bold">選擇課程 <span className="text-accent">*</span></label>
                                <div className="relative">
                                    <select 
                                        name="level"
                                        value={formData.level}
                                        onChange={handleInputChange}
                                        className={`w-full bg-milk border-2 border-mocha px-4 py-3 appearance-none focus:outline-none focus:border-ink focus:bg-white transition-all cursor-pointer rounded-xl font-sans font-bold ${!formData.level ? 'text-gray-400' : 'text-ink'}`}
                                    >
                                        <option value="" disabled>請點擊選擇課程</option>
                                        <option value="五十音發音課（零基礎）">五十音發音課（零基礎）</option>
                                        <option value="N5文法會話課（初級日語）">N5文法會話課（初級日語）</option>
                                        <option value="N4文法會話課（進階日語）">N4文法會話課（進階日語）</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="flex justify-between items-center pt-6">
                        <button 
                            onClick={handleBack}
                            className="text-sm tracking-widest text-[#8C7E71] hover:text-[#4A3F35] transition-colors flex items-center font-bold px-4 py-2 select-none outline-none"
                        >
                            返回上一步
                        </button>
                        <button 
                            onClick={handleNext}
                            disabled={!formData.name || !formData.email || !formData.level}
                            className={`px-12 py-4 font-sans tracking-widest transition-all duration-300 rounded-full font-bold select-none outline-none
                                ${(!formData.name || !formData.email || !formData.level) ? 'bg-[#E6DED5] text-[#8C7E71] border-2 border-[#D4C4B7] cursor-not-allowed' : 'bg-[#4A3F35] border-2 border-[#4A3F35] text-white hover:bg-[#8C7E71] active:scale-95 shadow-lg'}
                            `}
                        >
                            選擇方案
                        </button>
                    </div>
                </div>
            );

            const renderStep3 = () => {
                const selectedPlanData = PLANS.find(p => p.id === formData.plan) || null;
                const isPrepaid = formData.plan === 'prepaid';

                return (
                <div className="fade-in max-w-lg mx-auto">
                    {paymentSuccess ? (
                        <div className="p-10 line-border bg-white text-center relative">
                            <h2 className="text-3xl font-serif mb-4 text-ink tracking-widest font-bold">
                                {isPrepaid ? '預約成功' : '訂單已建立'}
                            </h2>
                            
                            <div className="text-ink-light mb-6 text-sm tracking-wider leading-relaxed font-bold">
                                {isPrepaid ? (
                                    <React.Fragment>
                                        <p className="mb-2">已為您保留上課時段</p>
                                        {remainingClasses !== null ? (
                                            <React.Fragment>
                                                <span className="text-ink bg-accent-light px-4 py-2 rounded-lg font-bold my-3 inline-block border border-accent">
                                                    本次扣除 1 堂，課程包剩餘：{remainingClasses} 堂
                                                </span><br/>
                                                <span className="text-sm mt-2 mb-4 inline-block text-ink bg-milk p-4 rounded-xl">
                                                    🔔 預約資訊與上課連結已寄至信箱囉！<br/>若有任何問題請與老師聯絡。
                                                </span>
                                            </React.Fragment>
                                        ) : (
                                            <span>老師將在確認剩餘堂數後與您聯繫</span>
                                        )}
                                    </React.Fragment>
                                ) : (
                                    <React.Fragment>
                                        <p>綠界結帳畫面已在<strong className="text-ink text-lg mx-1">新分頁</strong>開啟<br/>
                                        請前往完成付款，完成後可關閉此網頁</p>
                                        <span className="text-sm mt-6 mb-2 inline-block text-ink border-2 border-mocha bg-milk px-5 py-4 rounded-xl">
                                            🔔 確認收到款項後，預約資訊與上課連結將會傳給您！<br/>若有任何問題隨時歡迎請與老師聯絡。
                                        </span>
                                    </React.Fragment>
                                )}
                            </div>

                            {!isPrepaid && (
                                <div className="mb-8">
                                    <a 
                                        href={formData.plan === '1' ? 'https://p.ecpay.com.tw/6032D8C' : formData.plan === '4' ? 'https://p.ecpay.com.tw/8510797' : 'https://p.ecpay.com.tw/8D937B9'} 
                                        target="_blank" 
                                        rel="noopener noreferrer"
                                        className="text-xs text-ink-light border-b border-ink-light hover:text-ink hover:border-ink transition-colors pb-1 font-bold"
                                    >
                                        如果沒有彈出新視窗，請點擊此處前往結帳
                                    </a>
                                </div>
                            )}

                            <button 
                                onClick={() => window.location.reload()}
                                className="w-full py-4 mt-2 bg-white text-ink border-2 border-mocha hover:border-ink hover:text-ink transition-colors font-sans tracking-widest text-sm rounded-full font-bold select-none shadow-sm outline-none"
                            >
                                回到首頁
                            </button>
                        </div>
                    ) : (
                        <div className="space-y-6">
                            <div className="p-8 line-border bg-white relative">
                                <h3 className="text-xl font-serif mb-8 text-center tracking-widest border-b-2 border-mocha pb-4 text-ink font-bold">選擇購買方案</h3>
                                
                                <div className="mb-8">
                                    <div className="space-y-4">
                                        {PLANS.map(plan => {
                                            const isSelected = formData.plan === plan.id;
                                            return (
                                                <button 
                                                    key={plan.id}
                                                    onClick={() => setFormData({...formData, plan: plan.id})}
                                                    className={`w-full text-left cursor-pointer border-2 p-5 transition-all duration-300 relative flex justify-between items-center rounded-xl select-none outline-none
                                                        ${isSelected ? 'border-[#C19A6B] bg-[#F3EDE7] shadow-md' : 'border-[#E6DED5] bg-white hover:border-[#C19A6B] hover:bg-[#FAF7F2]'}
                                                    `}
                                                >
                                                    <div className="flex flex-col pl-2">
                                                        <div className="flex items-center flex-wrap gap-2 mb-1">
                                                            <span className={`font-serif tracking-widest text-lg font-bold text-[#4A3F35]`}>{plan.name}</span>
                                                            {plan.tag && (
                                                                <span className={`text-[10px] px-2 py-1 rounded-md font-bold transition-colors shadow-sm
                                                                    ${plan.id === 'prepaid' ? 
                                                                        (isSelected ? 'bg-[#C19A6B] text-white' : 'bg-[#FAF7F2] text-[#8C7E71] border border-[#E6DED5]') : 
                                                                        'bg-[#FFF0E6] text-[#E85D04] border border-[#FFDACC]'} 
                                                                `}>
                                                                    {plan.tag}
                                                                </span>
                                                            )}
                                                        </div>
                                                        {plan.originalPrice && (
                                                            <span className="text-[11px] text-[#8C7E71] tracking-widest line-through mt-1 font-sans">原價 NT$ {plan.originalPrice}</span>
                                                        )}
                                                    </div>
                                                    <div className="text-right">
                                                        {plan.price > 0 ? (
                                                            <span className={`text-xl font-sans tracking-wider font-bold ${isSelected ? 'text-[#C19A6B]' : 'text-[#4A3F35]'}`}>NT$ {plan.price}</span>
                                                        ) : (
                                                            <span className={`text-sm font-sans tracking-wider font-bold ${isSelected ? 'text-[#C19A6B]' : 'text-[#4A3F35]'}`}>無須付費</span>
                                                        )}
                                                    </div>
                                                </button>
                                            );
                                        })}
                                    </div>
                                    
                                    {isPrepaid && (
                                        <div className="mt-6 p-6 bg-milk border-2 border-mocha fade-in rounded-xl">
                                            <label className="block text-sm tracking-widest text-ink mb-3 font-bold">輸入課程包代碼 <span className="text-accent">*</span></label>
                                            <input 
                                                type="text" 
                                                name="prepaidCode"
                                                value={formData.prepaidCode}
                                                onChange={handleInputChange}
                                                className="w-full bg-white border-2 border-mocha px-4 py-3 focus:outline-none focus:border-ink transition-colors placeholder-gray-400 text-ink font-sans font-bold rounded-lg shadow-sm"
                                                placeholder="請輸入專屬代碼"
                                            />
                                        </div>
                                    )}
                                </div>

                                {formData.plan ? (
                                    <div className="fade-in bg-milk p-6 rounded-xl border border-mocha">
                                        <h3 className="text-sm font-sans mb-4 text-center tracking-widest border-b-2 border-mocha pb-3 text-ink font-bold">訂單明細</h3>
                                        <div className="space-y-4 pb-4 mb-4 text-sm border-b-2 border-mocha">
                                            <div className="flex justify-between items-center">
                                                <span className="text-ink-light tracking-widest text-xs font-bold">預約時間</span>
                                                <span className="font-sans text-ink font-bold">{formatDisplayDate(selectedDate)} {selectedTime}</span>
                                            </div>
                                            <div className="flex justify-between items-center">
                                                <span className="text-ink-light tracking-widest text-xs font-bold">課程</span>
                                                <span className="font-sans text-ink font-bold">{formData.level}</span>
                                            </div>
                                        </div>
                                        
                                        <div className="flex justify-between items-end mb-6">
                                            <span className="font-sans text-sm tracking-widest text-ink-light font-bold">總計</span>
                                            <span className="text-3xl font-sans text-ink tracking-wider font-bold">NT$ {selectedPlanData.price}</span>
                                        </div>

                                        {errorMsg && (
                                            <div className="mb-6 text-center text-red-600 bg-red-50 py-3 rounded-lg border border-red-200 text-sm tracking-widest font-bold">
                                                {errorMsg}
                                            </div>
                                        )}

                                        {isPaying ? (
                                            <div className="w-full py-4 border-2 border-[#4A3F35] bg-white flex items-center justify-center space-x-3 rounded-full">
                                                <div className="loader"></div>
                                                <span className="text-sm tracking-widest text-[#4A3F35] font-bold">處理中...</span>
                                            </div>
                                        ) : (
                                            <button 
                                                onClick={handlePayment}
                                                disabled={isPrepaid && !formData.prepaidCode}
                                                className={`w-full py-4 transition-all duration-300 font-sans tracking-widest flex items-center justify-center text-base rounded-full shadow-md font-bold select-none outline-none border-2
                                                    ${isPrepaid ? 
                                                        (!formData.prepaidCode ? 'bg-[#E6DED5] border-[#D4C4B7] text-[#8C7E71] cursor-not-allowed shadow-none' : 'bg-[#4A3F35] border-[#4A3F35] text-white hover:bg-[#8C7E71] active:scale-95') 
                                                        : 'bg-[#4A3F35] border-[#4A3F35] text-white hover:bg-[#8C7E71] active:scale-95'}
                                                `}
                                            >
                                                {isPrepaid ? '提交預約申請' : '前往結帳'}
                                            </button>
                                        )}
                                    </div>
                                ) : (
                                    <div className="text-center border-t-2 border-[#E6DED5] pt-8 pb-4">
                                        <p className="text-sm tracking-widest text-[#8C7E71] font-bold">請先選擇上方方案</p>
                                    </div>
                                )}
                            </div>
                            
                            {!isPaying && (
                                <div className="flex justify-center">
                                    <button 
                                        onClick={handleBack}
                                        className="text-sm tracking-widest text-[#8C7E71] hover:text-[#4A3F35] transition-colors px-4 py-2 font-bold select-none outline-none"
                                    >
                                        返回上一步
                                    </button>
                                </div>
                            )}
                        </div>
                    )}
                </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col font-sans relative">
                    {showLogin && (
                        <div className="fixed inset-0 bg-[#4A3F35]/40 z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl p-8 w-full max-w-xs shadow-2xl border-2 border-[#E6DED5] fade-in text-center">
                                <h3 className="font-serif text-[#4A3F35] tracking-widest mb-6 font-bold text-lg">進入後台管理</h3>
                                <input 
                                    type="password" 
                                    value={pwdInput}
                                    onChange={(e) => { setPwdInput(e.target.value); setPwdError(''); }}
                                    placeholder="請輸入密碼"
                                    className="w-full text-center border-2 border-[#E6DED5] px-4 py-3 mb-2 focus:outline-none focus:border-[#4A3F35] rounded-lg transition-all bg-[#FAF7F2] font-sans text-[#4A3F35] font-bold outline-none"
                                />
                                {pwdError && <p className="text-red-500 text-xs mt-2 mb-2 font-bold">{pwdError}</p>}
                                <div className="flex justify-between mt-8 space-x-3">
                                    <button onClick={() => { setShowLogin(false); setPwdInput(''); setPwdError(''); }} className="flex-1 py-3 text-[#8C7E71] hover:bg-[#FAF7F2] rounded-xl text-sm tracking-widest transition-colors font-bold bg-white border-2 border-[#E6DED5] hover:border-[#4A3F35] outline-none">取消</button>
                                    <button onClick={() => {
                                        if (pwdInput === '121314') {
                                            setIsAdmin(true);
                                            setShowLogin(false);
                                            setPwdInput('');
                                        } else {
                                            setPwdError('密碼錯誤');
                                        }
                                    }} className="flex-1 py-3 text-[#4A3F35] hover:bg-[#FAF7F2] rounded-xl text-sm tracking-widest transition-colors font-bold bg-white border-2 border-[#E6DED5] hover:border-[#4A3F35] outline-none">登入</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <header className="pt-16 pb-8 text-center relative select-none">
                        <button 
                            onClick={() => isAdmin ? setIsAdmin(false) : setShowLogin(true)}
                            className="absolute top-4 right-4 md:top-8 md:right-8 text-xs text-ink tracking-widest border-2 border-mocha hover:border-ink hover:text-ink hover:bg-milk px-5 py-2.5 rounded-full transition-all bg-white font-bold shadow-sm outline-none"
                        >
                            {isAdmin ? '登出後台' : '進入後台'}
                        </button>
                        <h1 className="text-4xl md:text-5xl font-serif text-ink tracking-[0.15em] font-bold">日文老鳥</h1>
                        <p className="text-[10px] md:text-xs font-sans tracking-[0.4em] text-ink-light uppercase flex items-center justify-center mt-5 font-bold">
                            <span className="w-10 h-[2px] bg-mocha mr-4"></span>
                            日語線上家教 Vivi老師
                            <span className="w-10 h-[2px] bg-mocha ml-4"></span>
                        </p>
                    </header>

                    <main className="flex-1 container mx-auto px-4 max-w-5xl pb-24 pt-4">
                        {!paymentSuccess && <StepIndicator currentStep={step} />}

                        <div className="transition-all duration-500">
                            {step === 1 && renderStep1()}
                            {step === 2 && renderStep2()}
                            {step === 3 && renderStep3()}
                        </div>
                    </main>

                    <footer className="py-10 text-center border-t-2 border-mocha">
                        <p className="text-xs text-ink-light font-sans tracking-[0.2em] font-bold select-none">
                            &copy; 2026 objapanese
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
