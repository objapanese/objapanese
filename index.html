<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日語家教預約 | 日文老鳥</title>
    
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
    
    <script>
        window.tailwind = {
            config: {
                theme: {
                    extend: {
                        colors: {
                            'milk': '#FAF7F2',       /* 溫暖的奶咖底色 */
                            'card': '#FFFFFF',       /* 實體白底卡片 */
                            'mocha': '#E6DED5',      /* 柔和拿鐵邊框 */
                            'mocha-dark': '#D4C4B7', /* 較深的邊框 */
                            'ink': '#4A3F35',        /* 深咖啡字體，確保清晰 */
                            'ink-light': '#8C7E71',  /* 淺咖啡說明字體 */
                            'accent': '#C19A6B',     /* 焦糖奶茶色 (主要按鈕與選取狀態) */
                            'accent-hover': '#A88256',
                            'accent-light': '#F3EDE7'/* 淺焦糖底色 (卡片選取狀態) */
                        },
                        fontFamily: {
                            'sans': ['"Noto Sans TC"', 'sans-serif'],
                            'serif': ['"Noto Serif TC"', 'serif'],
                        }
                    }
                }
            }
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;500;700&display=swap');
        
        * {
            -webkit-tap-highlight-color: transparent; /* 徹底移除手機點擊反白框 */
        }

        body {
            background-color: #FAF7F2; /* 奶咖底色 */
            background-image: 
                linear-gradient(rgba(212, 196, 183, 0.25) 1px, transparent 1px),
                linear-gradient(90deg, rgba(212, 196, 183, 0.25) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #4A3F35;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E6DED5; border-radius: 4px; }

        /* 純實體白底卡片，無任何玻璃效果 */
        .line-border { 
            background-color: #FFFFFF;
            border: 2px solid #E6DED5;
            border-radius: 1.5rem;
            box-shadow: 0 8px 24px rgba(74, 63, 53, 0.04);
        }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader {
            border: 3px solid #F3EDE7;
            border-top: 3px solid #4A3F35;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const GOOGLE_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbyetnlJlnFp8atdReeRS4Rx8bA1IVDVialahLq2iHj4ARTGLAXWcgEE0otjH-edDub9mQ/exec';

        const TIME_SLOTS = ["19:00~19:50", "20:00~20:50", "21:00~21:50"];

        const PLANS = [
            { id: '1', name: '單堂課程', price: 700, originalPrice: null, tag: '', subtitle: '' },
            { id: '8', name: '8堂課程包', price: 4800, originalPrice: 5600, tag: '', subtitle: '每堂只要 NT$600' },
            { id: '20', name: '20堂課程包', price: 11000, originalPrice: 14000, tag: '', subtitle: '每堂只要 NT$550' },
            { id: 'prepaid', name: '使用已購課程包預約', price: 0, originalPrice: null, tag: '請輸入專屬代碼', subtitle: '' }
        ];

        const formatDate = (date) => {
            const yyyy = date.getFullYear();
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        };

        const formatDisplayDate = (date) => {
            const days = ['日', '一', '二', '三', '四', '五', '六'];
            return `${date.getMonth() + 1}/${date.getDate()} (${days[date.getDay()]})`;
        };

        const generateDemoBookedSlots = () => {
            const slots = [];
            let currentDate = new Date(); 
            currentDate.setHours(currentDate.getHours() + 24);

            let validDaysCount = 0;
            for (let i = 0; i < 60; i++) { 
                const dayOfWeek = currentDate.getDay();
                if (dayOfWeek === 0 || (dayOfWeek >= 3 && dayOfWeek <= 6)) {
                    if (validDaysCount === 0) slots.push(`${formatDate(currentDate)}-19:00~19:50`);
                    if (validDaysCount === 1) slots.push(`${formatDate(currentDate)}-21:00~21:50`);
                    if (validDaysCount === 2) slots.push(`${formatDate(currentDate)}-20:00~20:50`);
                    validDaysCount++;
                }
                currentDate.setDate(currentDate.getDate() + 1);
            }
            return slots;
        };

        const StepIndicator = ({ currentStep }) => (
            <div className="flex justify-between items-start w-full max-w-lg mx-auto mb-6 font-serif text-xs md:text-sm tracking-widest relative z-10 select-none px-2">
                <div className="absolute top-4 left-[12.5%] right-[12.5%] h-[2px] bg-[#E6DED5] -z-10"></div>
                <div 
                    className="absolute top-4 left-[12.5%] h-[2px] bg-[#4A3F35] -z-10 transition-all duration-500 ease-in-out" 
                    style={{ width: `${(Math.min(currentStep, 4) - 1) * 33.33}%` }}
                ></div>
                {[
                    { step: 1, label: '日期' },
                    { step: 2, label: '時段' },
                    { step: 3, label: '資料' },
                    { step: 4, label: '結帳' }
                ].map(item => (
                    <div key={item.step} className={`flex flex-col items-center transition-all bg-[#FAF7F2] px-2 z-10 duration-300 ${currentStep >= item.step ? 'text-[#4A3F35] font-bold' : 'text-[#8C7E71] opacity-60'}`}>
                        <span className={`w-8 h-8 rounded-full flex items-center justify-center mb-2 transition-all font-sans duration-300 ${currentStep >= item.step ? 'border-2 border-[#4A3F35] bg-[#4A3F35] text-white shadow-sm scale-110' : 'border-2 border-[#E6DED5] bg-white text-[#8C7E71]'}`}>
                            {item.step}
                        </span>
                        <span>{item.label}</span>
                    </div>
                ))}
            </div>
        );

        const App = () => {
            const [step, setStep] = useState(1);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [pwdInput, setPwdInput] = useState('');
            const [pwdError, setPwdError] = useState('');
            const [selectedDate, setSelectedDate] = useState(null);
            const [selectedTime, setSelectedTime] = useState(null);
            
            const [formData, setFormData] = useState({ name: '', email: '', level: '已與老師聯絡', plan: '', prepaidCode: '' });
            
            const [isPaying, setIsPaying] = useState(false);
            const [paymentSuccess, setPaymentSuccess] = useState(false);
            const [remainingClasses, setRemainingClasses] = useState(null);
            const [errorMsg, setErrorMsg] = useState("");
            const [viewDate, setViewDate] = useState(new Date());

            const resetAppToHome = () => {
                setStep(1);
                setSelectedDate(null);
                setSelectedTime(null);
                setFormData({ name: '', email: '', level: '已與老師聯絡', plan: '', prepaidCode: '' });
                setIsPaying(false);
                setPaymentSuccess(false);
                setRemainingClasses(null);
                setErrorMsg("");
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const initialBookedSlots = useMemo(() => generateDemoBookedSlots(), []);
            
            const [bookedSlots, setBookedSlots] = useState(() => {
                const saved = localStorage.getItem('japanese_tutor_booked_slots');
                return saved ? JSON.parse(saved) : [];
            });
            const [closedDays, setClosedDays] = useState(() => {
                const saved = localStorage.getItem('japanese_tutor_closed_days');
                return saved ? JSON.parse(saved) : [];
            });
            
            const [isLoadingSlots, setIsLoadingSlots] = useState(true);

            useEffect(() => {
                localStorage.setItem('japanese_tutor_booked_slots', JSON.stringify(bookedSlots));
            }, [bookedSlots]);

            useEffect(() => {
                localStorage.setItem('japanese_tutor_closed_days', JSON.stringify(closedDays));
            }, [closedDays]);

            useEffect(() => {
                let interval;
                
                const fetchBookedSlots = async () => {
                    if (!GOOGLE_WEBHOOK_URL) {
                        if (bookedSlots.length === 0) {
                            setBookedSlots(initialBookedSlots);
                        }
                        setIsLoadingSlots(false);
                        return;
                    }
                    try {
                        const response = await fetch(GOOGLE_WEBHOOK_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify({ type: 'get_slots' })
                        });
                        
                        const text = await response.text();
                        let result = null;
                        try {
                            result = JSON.parse(text);
                        } catch (e) {}

                        if (result) {
                            if (result.slots && result.slots.length > 0) {
                                 setBookedSlots(prev => {
                                    const combined = [...new Set([...prev, ...result.slots])];
                                    return combined;
                                });
                            }
                            if (result.closedDays) {
                                 setClosedDays(prev => {
                                    const combined = [...new Set([...prev, ...result.closedDays])];
                                    return combined;
                                });
                            }
                        }
                    } catch (error) {
                        console.warn('更新時段失敗，可能處於離線狀態。使用本機暫存資料。');
                        if (bookedSlots.length === 0) {
                            setBookedSlots(initialBookedSlots);
                        }
                    } finally {
                        setIsLoadingSlots(false);
                    }
                };

                fetchBookedSlots();

                if (step === 1 || step === 2) {
                    interval = setInterval(fetchBookedSlots, 8000);
                }

                return () => {
                    if (interval) clearInterval(interval);
                };
            }, [step, initialBookedSlots]);

            const prevMonth = () => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1));
            const nextMonth = () => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1));

            const handleNext = () => {
                if (step === 2 && (isAdmin || (selectedDate && selectedTime))) {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    setStep(3);
                }
                if (step === 3 && formData.name && formData.email) {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    setStep(4);
                }
            };

            const handleBack = () => {
                if (step > 1) {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    setStep(step - 1);
                }
            };

            const handlePayment = async () => {
                let newWindow = null;
                if (formData.plan !== 'prepaid') {
                    let paymentUrl = '';
                    if (formData.plan === '1') paymentUrl = 'https://p.ecpay.com.tw/6032D8C';
                    else if (formData.plan === '8') paymentUrl = 'https://p.ecpay.com.tw/8D937B9';
                    else if (formData.plan === '20') paymentUrl = 'https://p.ecpay.com.tw/5B755BA';

                    if (paymentUrl) {
                        newWindow = window.open(paymentUrl, '_blank');
                    }
                }

                setIsPaying(true);
                setErrorMsg("");
                
                if (formData.plan === 'prepaid') {
                    if (GOOGLE_WEBHOOK_URL) {
                        try {
                            const response = await fetch(GOOGLE_WEBHOOK_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                body: JSON.stringify({
                                    type: 'book_class',
                                    name: formData.name,
                                    email: formData.email,
                                    level: formData.level,
                                    date: formatDate(selectedDate),
                                    displayDate: formatDisplayDate(selectedDate), 
                                    time: selectedTime,
                                    code: formData.prepaidCode
                                })
                            });
                            
                            const result = await response.json(); 

                            if (result.status === 'success') {
                                setRemainingClasses(result.remaining);
                                setIsPaying(false);
                                setPaymentSuccess(true);
                                const slotKey = `${formatDate(selectedDate)}-${selectedTime}`;
                                setBookedSlots(prev => [...prev, slotKey]);
                            } else {
                                setIsPaying(false);
                                setErrorMsg("預約失敗：" + result.message);
                            }
                        } catch (e) {
                            console.error('送出失敗', e);
                            setIsPaying(false);
                            setErrorMsg("連線發生錯誤，請稍後再試。");
                        }
                    }
                } else {
                    if (GOOGLE_WEBHOOK_URL) {
                        try {
                            const selectedPlanName = PLANS.find(p => p.id === formData.plan).name;
                            fetch(GOOGLE_WEBHOOK_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                body: JSON.stringify({
                                    type: 'new_purchase', 
                                    name: formData.name,
                                    email: formData.email,
                                    level: formData.level,
                                    date: formatDate(selectedDate),
                                    displayDate: formatDisplayDate(selectedDate),
                                    time: selectedTime,
                                    plan: selectedPlanName
                                })
                            });
                        } catch (e) {
                            console.error('拋送待付款資料失敗', e);
                        }
                    }

                    setTimeout(() => {
                        setIsPaying(false);
                        setPaymentSuccess(true);
                        const slotKey = `${formatDate(selectedDate)}-${selectedTime}`;
                        setBookedSlots(prev => [...prev, slotKey]);
                    }, 1000);
                }
            };

            const handleInputChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
            };

            const renderStep1 = () => {
                const year = viewDate.getFullYear();
                const month = viewDate.getMonth();
                const rawFirstDay = new Date(year, month, 1).getDay();
                const firstDayIndex = (rawFirstDay + 6) % 7; 
                const daysInMonth = new Date(year, month + 1, 0).getDate();

                const now = new Date();
                const twentyFourHoursLater = new Date(now.getTime() + (24 * 60 * 60 * 1000));
                
                const todayMidnight = new Date();
                todayMidnight.setHours(0, 0, 0, 0);
                const maxDate = new Date(todayMidnight);
                maxDate.setMonth(maxDate.getMonth() + 2);

                const calendarDays = [];
                const weekDays = ['一', '二', '三', '四', '五', '六', '日'];

                for (let i = 0; i < firstDayIndex; i++) {
                    calendarDays.push(<div key={`blank-${i}`} className="p-1"></div>);
                }

                for (let d = 1; d <= daysInMonth; d++) {
                    const currentDate = new Date(year, month, d);
                    
                    const earliestClassTime = new Date(year, month, d, 19, 0, 0);
                    const isPast24Hours = earliestClassTime < twentyFourHoursLater;
                    
                    currentDate.setHours(0, 0, 0, 0);
                    const isTooFar = currentDate > maxDate;
                    
                    const dayOfWeek = currentDate.getDay();
                    const isAvailableDay = dayOfWeek !== 1 && dayOfWeek !== 2; 
                    const dateStr = formatDate(currentDate);
                    const isDayClosed = closedDays.includes(dateStr); 
                    
                    const isBookable = !isPast24Hours && !isTooFar && isAvailableDay && !isDayClosed;
                    
                    const isClickable = isAdmin ? (!isTooFar && isAvailableDay) : isBookable;
                    
                    const isSelected = selectedDate && selectedDate.getDate() === d && selectedDate.getMonth() === month && selectedDate.getFullYear() === year;

                    calendarDays.push(
                        <div key={d} className="flex justify-center py-0.5">
                            <button 
                                disabled={!isClickable}
                                onClick={() => { 
                                    setSelectedDate(currentDate); 
                                    setSelectedTime(null); 
                                    setStep(2); 
                                    window.scrollTo({ top: 0, behavior: 'smooth' }); 
                                }}
                                className={`w-9 h-9 rounded-full flex items-center justify-center text-[15px] font-sans font-bold transition-all duration-300 select-none outline-none ${!isClickable ? 'text-gray-300 cursor-not-allowed' : isSelected ? 'bg-[#4A3F35] text-white shadow-md border-2 border-[#4A3F35]' : (isAdmin && isDayClosed) ? 'text-gray-400 bg-gray-100 hover:border-gray-300 border-2 border-transparent' : 'text-[#4A3F35] bg-white border-2 border-transparent hover:border-[#C19A6B] hover:bg-[#FAF7F2]'}`}
                            >
                                {d}
                            </button>
                        </div>
                    );
                }

                return (
                    <div className="fade-in space-y-4 max-w-md mx-auto">
                        {isAdmin && (
                            <div className="mb-2 bg-accent-light border border-accent rounded-2xl p-3 text-center text-ink text-xs tracking-widest fade-in font-bold">
                                🔧 後台模式：點擊日期進入關閉時段設定。
                            </div>
                        )}
                        <div className="text-center mb-4">
                            <h2 className="text-xl font-serif mb-2 text-ink tracking-wider font-bold">選擇上課日期</h2>
                            <div className="flex items-center justify-center space-x-4 text-[11px] tracking-widest text-ink-light font-bold">
                                <span className="flex items-center"><span className="w-2.5 h-2.5 rounded-full bg-white border-[1.5px] border-mocha mr-1.5"></span>可預約</span>
                                <span className="flex items-center"><span className="w-2.5 h-2.5 rounded-full bg-gray-200 border-[1.5px] border-gray-300 mr-1.5"></span>已額滿</span>
                            </div>
                        </div>

                        <div className="p-5 line-border flex flex-col relative bg-white shadow-sm">
                            <div className="flex justify-between items-center mb-4 px-2 select-none">
                                <button onClick={prevMonth} className="p-1.5 text-ink-light hover:text-ink transition-colors outline-none bg-milk rounded-full">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5 stroke-[2.5]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7" /></svg>
                                </button>
                                <span className="font-sans tracking-widest text-base text-ink font-bold">{year}年 {month + 1}月</span>
                                <button onClick={nextMonth} className="p-1.5 text-ink-light hover:text-ink transition-colors outline-none bg-milk rounded-full">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5 stroke-[2.5]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7" /></svg>
                                </button>
                            </div>

                            <div className="grid grid-cols-7 gap-1 mb-2 text-center text-xs text-ink-light tracking-widest border-b-2 border-mocha pb-2 font-bold select-none">
                                {weekDays.map(wd => <div key={wd}>{wd}</div>)}
                            </div>
                            <div className="grid grid-cols-7 gap-y-1 mt-1">
                                {calendarDays}
                            </div>
                        </div>

                        {/* LINE 加入好友按鈕 (僅顯示於第一步) */}
                        <div className="flex justify-center mt-6">
                            <a 
                                href="https://lin.ee/OYIH1YB" 
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="hover:scale-105 active:scale-95 transition-transform drop-shadow-sm inline-block"
                                title="加入 LINE 好友"
                            >
                                <img src="https://scdn.line-apps.com/n/line_add_friends/btn/zh-Hant.png" alt="加入好友" style={{ height: '25px' }} border="0" />
                            </a>
                        </div>
                    </div>
                );
            };

            const renderStep2 = () => {
                const isCurrentDayClosed = selectedDate ? closedDays.includes(formatDate(selectedDate)) : false;

                return (
                    <div className="fade-in max-w-md mx-auto">
                        <div className="text-center mb-8">
                            <h2 className="text-2xl font-serif mb-3 text-ink tracking-wider font-bold">選擇上課時段</h2>
                            <p className="text-sm font-sans tracking-widest text-ink font-bold bg-milk inline-block px-5 py-2 rounded-full border border-mocha">
                                已選日期：{formatDisplayDate(selectedDate)}
                            </p>
                        </div>

                        <div className="p-8 line-border flex flex-col relative bg-white shadow-sm min-h-[300px]">
                            {isAdmin && (
                                <button
                                    onClick={async () => {
                                        const dateStr = formatDate(selectedDate);
                                        const isClosing = !isCurrentDayClosed; 
                                        
                                        if (isClosing) {
                                            setClosedDays([...closedDays, dateStr]);
                                        } else {
                                            setClosedDays(closedDays.filter(d => d !== dateStr));
                                        }

                                        if (GOOGLE_WEBHOOK_URL) {
                                            try {
                                                await fetch(GOOGLE_WEBHOOK_URL, {
                                                    method: 'POST',
                                                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                                    body: JSON.stringify({
                                                        type: 'toggle_day',
                                                        date: dateStr
                                                    })
                                                });
                                            } catch(e) {
                                                console.error("後台開關日期失敗", e);
                                            }
                                        }
                                    }}
                                    className={`w-full group relative flex items-center justify-between px-6 py-4 mb-6 border-2 transition-all duration-300 rounded-xl select-none outline-none ${isCurrentDayClosed ? 'bg-gray-100 border-gray-300 text-gray-500' : 'bg-white border-[#E6DED5] hover:border-red-300 hover:bg-red-50 text-[#4A3F35]'}`}
                                >
                                    <span className="text-base font-sans tracking-widest font-bold">
                                        {isCurrentDayClosed ? '整天已關閉' : '關閉整天時段'}
                                    </span>
                                    <span className={`text-xs tracking-widest px-3 py-1.5 transition-colors rounded-lg font-bold ${isCurrentDayClosed ? 'bg-white text-gray-500 border-2 border-gray-300' : 'bg-white text-[#8C7E71] border-2 border-[#E6DED5] group-hover:border-red-400 group-hover:text-red-500'}`}>
                                        {isCurrentDayClosed ? '點擊重新開放' : '點擊關閉'}
                                    </span>
                                </button>
                            )}

                            <div className={`space-y-4 flex-1 flex flex-col justify-center transition-opacity duration-300 ${isCurrentDayClosed ? 'opacity-30 pointer-events-none' : ''}`}>
                                {isLoadingSlots ? (
                                    <div className="flex justify-center items-center h-full min-h-[150px]">
                                        <div className="loader border-[#E6DED5] border-top-[#4A3F35]"></div>
                                    </div>
                                ) : (
                                    TIME_SLOTS.map((time, idx) => {
                                        const slotKey = `${formatDate(selectedDate)}-${time}`;
                                        const isBooked = bookedSlots.includes(slotKey);
                                        const isSelected = !isAdmin && selectedTime === time;

                                        return (
                                            <button
                                                key={idx}
                                                disabled={!isAdmin && isBooked}
                                                onClick={async () => {
                                                    if (isAdmin) {
                                                        const isClosingSlot = !isBooked;
